<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SmartShield Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard-container">

        <h1>SmartShield Analytics Dashboard</h1>

        <div class="dashboard-grid">

            <div class="dashboard-card">
                <h2>Total Scans</h2>
                <p id="totalScans">0</p>
            </div>

            <div class="dashboard-card">
                <h2>Scam Detections</h2>
                <p id="scamDetected">0</p>
            </div>

            <div class="dashboard-card">
                <h2>Safe Messages</h2>
                <p id="safeMessages">0</p>
            </div>

            <div class="dashboard-card">
                <h2>High Risk Threats</h2>
                <p id="highRisk">0</p>
            </div>

        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
